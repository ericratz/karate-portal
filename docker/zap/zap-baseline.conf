# OWASP ZAP baseline scan rules for the Karate Portal.
# Format: <ruleId>\t<action>\t<url-regex (optional)>
#   action is one of: WARN (default), IGNORE, FAIL
# Add IGNORE lines here to silence reviewed, accepted findings before wiring
# the scan into CI. Everything not listed defaults to WARN (won't fail the run
# thanks to -I in the compose command).
#
# Example (uncomment and set a real rule id after reviewing a scan):
# 10096	IGNORE	# Timestamp Disclosure - noisy, not a real issue here
