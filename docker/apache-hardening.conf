# Deny web access to dotfiles (.env, .git, .dockerignore, …). The app reads
# .env from disk at /var/www/html/karate/.env, which is under DocumentRoot, so
# without this Apache would serve it as plaintext — exposing DB credentials.
# Matches how production/XAMPP is configured (security.spec.js asserts this).
<FilesMatch "^\.">
    Require all denied
</FilesMatch>
