name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      # credentials.js is gitignored — recreate it from GitHub secrets
      - name: Write credentials file
        shell: powershell
        env:
          ADMIN_USER:  ${{ secrets.ADMIN_USER }}
          ADMIN_PASS:  ${{ secrets.ADMIN_PASS }}
          INST_USER:   ${{ secrets.INST_USER }}
          INST_PASS:   ${{ secrets.INST_PASS }}
          STU_USER:    ${{ secrets.STU_USER }}
          STU_PASS:    ${{ secrets.STU_PASS }}
          PARENT_USER: ${{ secrets.PARENT_USER }}
          PARENT_PASS: ${{ secrets.PARENT_PASS }}
        run: |
          Set-Content tests\credentials.js -Encoding utf8NoBOM -Value @(
            "module.exports = {",
            "    ADMIN_USER:  '$env:ADMIN_USER',",
            "    ADMIN_PASS:  '$env:ADMIN_PASS',",
            "    INST_USER:   '$env:INST_USER',",
            "    INST_PASS:   '$env:INST_PASS',",
            "    STU_USER:    '$env:STU_USER',",
            "    STU_PASS:    '$env:STU_PASS',",
            "    PARENT_USER: '$env:PARENT_USER',",
            "    PARENT_PASS: '$env:PARENT_PASS',",
            "};"
          )

      # .env is gitignored — copy from the live htdocs directory (same machine)
      - name: Copy .env for database access
        shell: powershell
        run: |
          $src = "C:\Users\ericratz\XAMPP\htdocs\karate\.env"
          if (Test-Path $src) { Copy-Item $src .env }

      - name: Run PHPUnit tests
        shell: powershell
        run: |
          & "C:\Users\ericratz\XAMPP\php\php.exe" portal/vendor/bin/phpunit --configuration portal/phpunit.xml

      - name: Run Playwright tests
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 14
