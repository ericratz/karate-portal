name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      # The runner service runs as SYSTEM, which has no ms-playwright cache
      # of its own — point it at the browsers already installed for the
      # interactive user instead of running `npx playwright install` here.
      PLAYWRIGHT_BROWSERS_PATH: C:\Users\ericratz\AppData\Local\ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default clean (git clean -ffdx) would remove the portal/vendor
          # junction below on every run — keep it off so vendor/ persists.
          clean: false

      # credentials.js is gitignored — recreate it from GitHub secrets
      - name: Write credentials file
        shell: powershell
        env:
          ADMIN_USER:  ${{ secrets.ADMIN_USER }}
          ADMIN_PASS:  ${{ secrets.ADMIN_PASS }}
          INST_USER:   ${{ secrets.INST_USER }}
          INST_PASS:   ${{ secrets.INST_PASS }}
          STU_USER:    ${{ secrets.STU_USER }}
          STU_PASS:    ${{ secrets.STU_PASS }}
          PARENT_USER: ${{ secrets.PARENT_USER }}
          PARENT_PASS: ${{ secrets.PARENT_PASS }}
        run: |
          $content = @"
          module.exports = {
              ADMIN_USER:  '$env:ADMIN_USER',
              ADMIN_PASS:  '$env:ADMIN_PASS',
              INST_USER:   '$env:INST_USER',
              INST_PASS:   '$env:INST_PASS',
              STU_USER:    '$env:STU_USER',
              STU_PASS:    '$env:STU_PASS',
              PARENT_USER: '$env:PARENT_USER',
              PARENT_PASS: '$env:PARENT_PASS',
          };
          "@
          [System.IO.File]::WriteAllText("$PWD\tests\credentials.js", $content, [System.Text.UTF8Encoding]::new($false))

      # .env is gitignored — copy from the live htdocs directory (same machine)
      - name: Copy .env for database access
        shell: powershell
        run: |
          $src = "C:\Users\ericratz\XAMPP\htdocs\karate\.env"
          if (Test-Path $src) { Copy-Item $src .env }

      - name: Run PHPUnit tests
        shell: powershell
        run: |
          & "C:\Users\ericratz\XAMPP\php\php.exe" "$env:GITHUB_WORKSPACE\portal\vendor\bin\phpunit" --configuration "$env:GITHUB_WORKSPACE\portal\phpunit.xml"

      - name: Run Playwright tests
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 14
