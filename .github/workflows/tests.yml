name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      # The runner box also runs XAMPP on port 80, so don't bind it. "0" tells
      # Docker to publish the app on a random free host port; the tests reach
      # the app over the Compose network (http://karate.test), not via the host port.
      APP_PORT: "0"
    # The runner service runs as LocalSystem, where `shell: bash` resolves to
    # WSL — which refuses to run as LocalSystem. Use PowerShell for all steps.
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # credentials.js is gitignored — recreate it from GitHub secrets. It is
      # bind-mounted into the ci container via ./tests, so global-setup finds it.
      - name: Write credentials file
        env:
          ADMIN_USER:  ${{ secrets.ADMIN_USER }}
          ADMIN_PASS:  ${{ secrets.ADMIN_PASS }}
          INST_USER:   ${{ secrets.INST_USER }}
          INST_PASS:   ${{ secrets.INST_PASS }}
          STU_USER:    ${{ secrets.STU_USER }}
          STU_PASS:    ${{ secrets.STU_PASS }}
          PARENT_USER: ${{ secrets.PARENT_USER }}
          PARENT_PASS: ${{ secrets.PARENT_PASS }}
        run: |
          $content = @"
          module.exports = {
              ADMIN_USER:  '$env:ADMIN_USER',
              ADMIN_PASS:  '$env:ADMIN_PASS',
              INST_USER:   '$env:INST_USER',
              INST_PASS:   '$env:INST_PASS',
              STU_USER:    '$env:STU_USER',
              STU_PASS:    '$env:STU_PASS',
              PARENT_USER: '$env:PARENT_USER',
              PARENT_PASS: '$env:PARENT_PASS',
          };
          "@
          [System.IO.File]::WriteAllText("$PWD\tests\credentials.js", $content, [System.Text.UTF8Encoding]::new($false))

      # Several runtime files are gitignored, so they aren't in the checkout —
      # copy them from the live htdocs directory (same machine as the runner):
      #   .env                 — DB creds + DB_INIT_FILE (points under backups/)
      #   backups/*.sql        — the DB seed .env references
      #   portal/admin/assets  — certificate template/signature/font (real
      #                          signature image, kept out of git); certificate.php
      #                          filemtime()s the template, warning if it's absent
      - name: Copy gitignored runtime files (.env, DB seed, cert assets)
        run: |
          $src = "C:\Users\ericratz\XAMPP\htdocs\karate"
          if (Test-Path "$src\.env") { Copy-Item "$src\.env" .env -Force }
          else { Write-Error "missing $src\.env"; exit 1 }
          if (Test-Path "$src\backups") {
            New-Item -ItemType Directory -Force backups | Out-Null
            Copy-Item "$src\backups\*.sql" backups\ -Force -ErrorAction SilentlyContinue
          }
          if (Test-Path "$src\portal\admin\assets") {
            Copy-Item "$src\portal\admin\assets" portal\admin\ -Recurse -Force
          }

      # Clear any leftover volume from a crashed prior run — the DB only imports
      # its seed into an empty volume, so a stale one would skip re-seeding.
      - name: Clean prior state
        run: |
          docker compose down -v --remove-orphans
          exit 0

      - name: Build images
        run: docker compose build

      # --wait blocks until db + app report healthy (app's healthcheck curls
      # login.php, proving app+db are wired up) — no host port needed.
      - name: Start db + app and wait for health
        run: docker compose up -d --wait db app

      - name: Dump logs if startup failed
        if: failure()
        run: docker compose logs app db

      # Two dedicated passes: the standard run enforces errorLevel 3 against
      # psalm-baseline.xml (a ratchet — pre-existing issues are baselined, any
      # NEW error fails the build), the taint run tracks source-to-sink data
      # flow. They do not overlap: taint mode does not perform the type checks.
      # The standard pass was dropped in 24d6c64 ("speed up psalm") and restored
      # in V4.4; on the containerized runner it costs roughly a minute.
      - name: Run Psalm standard analysis
        run: docker compose run --rm ci sh -c "cd portal && vendor/bin/psalm"

      - name: Run Psalm taint analysis
        run: docker compose run --rm ci sh -c "cd portal && vendor/bin/psalm --taint-analysis"

      - name: Run PHPUnit tests
        run: docker compose run --rm ci sh -c "cd portal && vendor/bin/phpunit"

      - name: Run frontend typecheck + Vitest component tests
        run: docker compose run --rm ci sh -c "cd frontend && npm run typecheck && npm test"

      - name: Run Playwright tests
        run: docker compose run --rm ci npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose down -v
